name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: build ${{ matrix.target }}
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/sksync-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/sksync" "$staging/sksync"
          tar -C "$staging" -czf "dist/sksync-${{ matrix.target }}.tar.gz" sksync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sksync-${{ matrix.target }}
          path: dist/sksync-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  build-linux:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/sksync-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/sksync" "$staging/sksync"
          tar -C "$staging" -czf "dist/sksync-${{ matrix.target }}.tar.gz" sksync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sksync-${{ matrix.target }}
          path: dist/sksync-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish-linux:
    name: publish Linux release assets
    needs: build-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sksync-*-unknown-linux-musl
          merge-multiple: true

      - name: Generate Linux checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Publish Linux assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  publish-macos:
    name: publish macOS release assets
    needs:
      - build-macos
      - publish-linux
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sksync-*-apple-darwin
          merge-multiple: true

      - name: Merge checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          gh release download "$TAG_NAME" --pattern checksums.txt --dir .
          sha256sum *.tar.gz > macos-checksums.txt
          cat checksums.txt macos-checksums.txt | sort -k2 > combined-checksums.txt
          mv combined-checksums.txt checksums.txt
          cat checksums.txt

      - name: Publish macOS assets and refreshed checksums
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" dist/*.tar.gz dist/checksums.txt --clobber
